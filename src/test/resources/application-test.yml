spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  liquibase:
    enabled: true
  kafka:
    listener:
      missing-topics-fatal: false
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  data:
    redis:
      timeout: 500ms
  cache:
    type: none

jwt:
  secret: test-secret-key-min-32-chars-long!!

logging:
  level:
    org.example.catalog: DEBUG
    org.testcontainers: WARN