global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'catalog-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'host.docker.internal:8081' ]
        labels:
          env: 'local'
      - targets: [ 'catalog:8081' ]
        labels:
          env: 'docker'